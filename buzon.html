<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="icon" type="image/png" href="assets/favicon-32.png" sizes="32x32" />
<link rel="icon" type="image/png" href="assets/favicon-16.png" sizes="16x16" />
<link rel="apple-touch-icon" href="assets/favicon-180.png" />
<link rel="shortcut icon" href="assets/favicon.ico" />
<title>Buzón — Menhera</title>
<link rel="stylesheet" href="css/theme.css" />
<link rel="stylesheet" href="css/layout.css" />
<link rel="stylesheet" href="css/buzon.css" />
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<div class="crt-overlay"></div>
<div class="crt-vignette"></div>

<div id="site-header"></div>

<section class="page-hero">
  <div class="wrap">
    <div class="eyebrow">Canal 07</div>
    <h1>Buzón</h1>
  </div>
</section>

<section class="page-body">
  <div class="wrap">

    <div class="panel buzon-form">
      <div style="margin-bottom:12px;">
        <label>Tu nombre (opcional)</label>
        <input id="msg-author" placeholder="ej. tu nick de Discord" style="width:100%; max-width:320px; margin-top:4px;" />
      </div>
      <div style="margin-bottom:14px;">
        <label>Mensaje</label>
        <textarea id="msg-content" rows="4" style="width:100%; margin-top:4px;" placeholder="Sugerencias, bugs, lo que sea…"></textarea>
      </div>
      <button class="btn btn-primary" id="send-msg-btn">Enviar</button>
      <span id="msg-status" class="dim" style="margin-left:12px; font-size:13px;"></span>
    </div>

    <div id="inbox-section" class="hidden" data-admin-only style="margin-top:32px;">
      <h3 style="margin-bottom:14px;">Bandeja de entrada</h3>
      <div id="inbox-list"></div>
    </div>

  </div>
</section>

<div id="site-footer"></div>

<script src="js/supabase-client.js"></script>
<script src="js/auth.js"></script>
<script src="js/components.js"></script>
<script src="js/buzon.js"></script>
<script>mountChrome('buzon');</script>
</body>
</html>
