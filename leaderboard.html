<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Puntuaciones — Menhera</title>
<link rel="icon" type="image/png" href="assets/favicon-32.png" sizes="32x32" />
<link rel="icon" type="image/png" href="assets/favicon-16.png" sizes="16x16" />
<link rel="apple-touch-icon" href="assets/favicon-180.png" />
<link rel="shortcut icon" href="assets/favicon.ico" />
<link rel="stylesheet" href="css/theme.css" />
<link rel="stylesheet" href="css/layout.css" />
<link rel="stylesheet" href="css/leaderboard.css" />
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<div class="crt-overlay"></div>
<div class="crt-vignette"></div>

<div id="site-header"></div>

<section class="page-hero">
  <div class="wrap">
    <div class="eyebrow">Canal 04</div>
    <h1>Puntuaciones</h1>
  </div>
</section>

<section class="page-body">
  <div class="wrap">

    <div id="lb-private-notice" class="panel hidden" style="padding:16px 20px; margin-bottom:18px; border-left:3px solid var(--red-deep);">
      <span class="dim">Esta sección es solo para administradores.</span>
    </div>

    <div id="lb-root" class="hidden" data-admin-only>
      <div class="panel lb-toolbar">
        <div>
          <label>Semana</label>
          <select id="week-select"></select>
        </div>
        <button class="btn btn-ghost hidden" id="new-week-btn" data-admin-only>+ Nueva semana</button>
        <button class="btn btn-primary hidden" id="save-lb-btn" data-admin-only>Guardar puntuaciones</button>
        <button class="btn btn-ghost" id="export-lb-img-btn">Exportar como imagen</button>
        <span id="lb-status" class="dim"></span>
      </div>

      <div class="lb-columns" id="lb-export-target">
        <div>
          <h3>Compañío A</h3>
          <table class="lb-table" id="table-A"></table>
        </div>
        <div>
          <h3>Compañío B</h3>
          <table class="lb-table" id="table-B"></table>
        </div>
      </div>
    </div>

  </div>
</section>

<div id="site-footer"></div>

<script src="js/supabase-client.js"></script>
<script src="js/auth.js"></script>
<script src="js/components.js"></script>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<script src="js/leaderboard.js"></script>
<script>mountChrome('leaderboard');</script>
</body>
</html>
