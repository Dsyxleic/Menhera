<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Acceso admin — Menhera</title>
<link rel="stylesheet" href="css/theme.css" />
<link rel="stylesheet" href="css/layout.css" />
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<div class="crt-overlay"></div>
<div class="crt-vignette"></div>

<div id="site-header"></div>

<section class="page-hero">
  <div class="wrap">
    <div class="eyebrow">Canal restringido</div>
    <h1>Acceso admin</h1>
  </div>
</section>

<section class="page-body">
  <div class="wrap" style="max-width:420px;">
    <div class="panel" style="padding:24px;">
      <div style="margin-bottom:14px;">
        <label for="email">Correo</label>
        <input id="email" type="email" style="width:100%; margin-top:4px;" />
      </div>
      <div style="margin-bottom:18px;">
        <label for="password">Contraseña</label>
        <input id="password" type="password" style="width:100%; margin-top:4px;" />
      </div>
      <button class="btn btn-primary" id="login-btn" style="width:100%;">Entrar</button>
      <p id="login-error" class="dim" style="color:var(--red-glow); margin-top:12px; font-size:13px;"></p>
    </div>
  </div>
</section>

<div id="site-footer"></div>

<script src="js/supabase-client.js"></script>
<script src="js/auth.js"></script>
<script src="js/components.js"></script>
<script>
mountChrome(null);

document.getElementById("login-btn").addEventListener("click", async () => {
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value;
  const errEl = document.getElementById("login-error");
  errEl.textContent = "";

  const error = await MenheraAuth.login(email, password);
  if (error) {
    errEl.textContent = "No se pudo entrar: " + error.message;
    return;
  }
  window.location.href = "index.html";
});
</script>
</body>
</html>
