</head>
<body>

  </div>
</section>

<section class="page-body">
  <div class="wrap">
    <div class="home-grid">

      <a class="home-card panel" href="tactic-maker.html">
        <div class="home-card-ch">02</div>
        <h3>Constructor</h3>
        <span class="home-card-cta">Entrar →</span>
      </a>

      <a class="home-card panel" href="library.html">
        <div class="home-card-ch">03</div>
        <h3>Biblioteca</h3>

      <a class="home-card panel" href="leaderboard.html">

<style>
.home-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
  gap: 16px;
}
.home-card {
  display: block;
  padding: 22px;
  position: relative;
  transition: border-color 0.15s, transform 0.15s;
  border-left: 3px solid var(--red-deep);
}
.home-card:hover {
  border-left-color: var(--red);
  transform: translateY(-2px);
  text-decoration: none;
}
.home-card-ch {
  font-family: var(--f-mono);
  color: var(--red-deep);
  font-size: 22px;
}
.home-card h3 {
  margin: 8px 0 10px;
  font-size: 22px;
}
.home-card p {
  color: var(--bone-dim);
  font-size: 14px;
  line-height: 1.5;
  margin: 0 0 14px;
}
.home-card-cta {
  font-family: var(--f-mono);
  font-size: 14px;
  color: var(--red-glow);
}
</style>
