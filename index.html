<link rel="icon" type="image/png" href="assets/favicon-16.png" sizes="16x16" />
<link rel="apple-touch-icon" href="assets/favicon-180.png" />
<link rel="shortcut icon" href="assets/favicon.ico" />
<link rel="stylesheet" href="css/theme.css" />

</head>
<body>
<div class="crt-overlay"></div>

<section class="page-body">
  <div class="wrap">
    <div class="home-grid">

      <a class="home-card panel" href="tactic-maker.html">
        <div class="home-card-ch">02</div>
        <h3>Constructor</h3>
        <span class="home-card-cta">Entrar →</span>
      </a>

      <a class="home-card panel" href="library.html">
        <div class="home-card-ch">03</div>
        <h3>Biblioteca</h3>
        <span class="home-card-cta">Entrar →</span>
      </a>

      <a class="home-card panel hidden" data-admin-only href="leaderboard.html">
        <div class="home-card-ch">04</div>
        <h3>Puntuaciones</h3>
        <span class="home-card-cta">Entrar →</span>
      </a>

      <a class="home-card panel hidden" data-admin-only href="characters.html">

        <h3>Personajes</h3>
        <span class="home-card-cta">Entrar →</span>
      </a>

      <a class="home-card panel hidden" data-admin-only href="personas.html">

        <span class="home-card-cta">Entrar →</span>
      </a>

      <a class="home-card panel" href="buzon.html">

        <span class="home-card-cta">Entrar →</span>
      </a>

    </div>

    <div style="margin-top:40px;">
      <h3 style="margin-bottom:14px;">Últimas rotaciones</h3>
      <div id="recent-rotations" class="recent-list">
        <p class="dim">Cargando…</p>
      </div>
    </div>

  </div>

<div id="site-footer"></div>

<script src="js/supabase-client.js"></script>
<script src="js/auth.js"></script>

<script>mountChrome('home');</script>

<style>
.home-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
  gap: 16px;
}
.home-card {
  display: block;
  padding: 22px;
  position: relative;
  transition: border-color 0.15s, transform 0.15s;
  border-left: 3px solid var(--red-deep);
}
.home-card:hover {
  border-left-color: var(--red);
  transform: translateY(-2px);
  text-decoration: none;
}
.home-card-ch {
  font-family: var(--f-mono);
  color: var(--red-deep);
  font-size: 22px;
}
.home-card h3 {
  margin: 8px 0 10px;
  font-size: 22px;
}
.home-card p {
  color: var(--bone-dim);
  font-size: 14px;
  line-height: 1.5;
  margin: 0 0 14px;
}
.home-card-cta {
  font-family: var(--f-mono);
  font-size: 14px;
  color: var(--red-glow);
}

.recent-list {
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.recent-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  padding: 12px 16px;
  background: var(--panel);
  border: 1px solid var(--line);
  border-left: 3px solid var(--static);
  text-decoration: none;
  transition: border-left-color 0.15s, transform 0.15s;
}
.recent-item:hover {
  border-left-color: var(--red);
  transform: translateX(2px);
  text-decoration: none;
}
.recent-item-title {
  font-family: var(--f-display);
  font-size: 15px;
  color: var(--bone);
  letter-spacing: 0.01em;
}
.recent-item-meta {
  font-family: var(--f-mono);
  font-size: 12px;
  color: var(--bone-dim);
  white-space: nowrap;
}
</style>
</body>
</html>
